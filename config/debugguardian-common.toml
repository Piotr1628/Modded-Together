#Per-mod switches for allowing a mod's log output. Set to false to silence all Log4j events emitted by that mod.
[logging]
	#Enable real-time in-game log monitoring and notifications
	enableLiveMonitor = true
	#API key for external AI log analyzer; blank uses DEBUG_GUARDIAN_AI_KEY env var
	aiServiceApiKey = ""
	#Number of identical errors to skip before logging again
	# Default: 100
	# Range: 1 ~ 10000
	errorReportInterval = 100

	[logging.modToggles]
		#Allow log output for [Let's Do] Furniture (furniture)
		furniture = true
		#Allow log output for Accents (accents)
